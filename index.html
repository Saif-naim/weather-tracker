<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <div class="top-bar">
      <div>
        <h1>Weather Tracker</h1>
        <p>Search weather by city name</p>
      </div>
      <button id="themeBtn" class="theme-btn">🌙</button>
    </div>

    <p id="dateTime" class="date-time"></p>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
    </div>

    <button id="locationBtn" class="location-btn">📍 Use My Location</button>

    <div id="loader" class="loader hidden"></div>

    <div id="weatherCard" class="weather-card hidden">
      <h2 id="cityName"></h2>
      <img id="weatherIcon" alt="Weather icon" />
      <h1 id="temperature"></h1>
      <p id="description"></p>

      <div class="details">
        <p>💧 Humidity <span id="humidity"></span></p>
        <p>🌬 Wind <span id="wind"></span></p>
        <p>🌡 Feels Like <span id="feelsLike"></span></p>
        <p>📈 Pressure <span id="pressure"></span></p>
        <p>👁 Visibility <span id="visibility"></span></p>
        <p>☁ Clouds <span id="clouds"></span></p>
        <p>🔥 Max Temp <span id="maxTemp"></span></p>
        <p>❄️ Min Temp <span id="minTemp"></span></p>
        <p>🌅 Sunrise <span id="sunrise"></span></p>
        <p>🌇 Sunset <span id="sunset"></span></p>
      </div>

      <h3 class="forecast-title">5-Day Forecast</h3>
      <div id="forecastContainer" class="forecast-container"></div>
    </div>

    <p id="errorMessage"></p>

    <footer>
      Built by Naim | Powered by OpenWeather
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
